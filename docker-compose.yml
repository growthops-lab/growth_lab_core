services:
  postgres:
    image: postgres:16-alpine
    container_name: growth-lab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: growth_lab
      POSTGRES_PASSWORD: growth_lab_password
      POSTGRES_DB: growth_lab
    ports:
      - "5432:5432"
    volumes:
      - growth_lab_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U growth_lab -d growth_lab"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  growth_lab_postgres:
