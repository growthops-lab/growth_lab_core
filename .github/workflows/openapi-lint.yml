name: OpenAPI Lint

# Manual OpenAPI validation workflow.

on:
  workflow_dispatch:

  push:
    branches:
      - master

  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  openapi-lint:
    name: OpenAPI Spectral Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '11.7.0'
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Show tool versions
        run: |
          pnpm --version
          node --version
          pnpm run lint:openapi:version

      - name: Run OpenAPI lint
        run: pnpm run lint:openapi
